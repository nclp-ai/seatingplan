<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中一級班主任座位表系統</title>
    <!-- 引入 Tailwind CSS 作為樣式框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 html2pdf.js 用於匯出 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.css"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; overflow: hidden;}
        /* 自定義滾動條 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        .student-card { transition: all 0.2s; cursor: grab; }
        .student-card:active { cursor: grabbing; transform: scale(0.95); }
        .student-card.dragging { opacity: 0.5; border: 2px dashed #3b82f6; }
        
        .seat { transition: all 0.3s; }
        .seat.drag-over { background-color: #bfdbfe; border-color: #3b82f6; transform: scale(1.02); }
        
        .blackboard {
            background: linear-gradient(to bottom, #2c3e50, #34495e);
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            border: 4px solid #7f8c8d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* 隱藏文件上傳按鈕，由圖片點擊觸發 */
        .photo-upload { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 頂部控制列 -->
    <header class="bg-white shadow-md p-4 z-10 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-chair text-blue-500 mr-2"></i>座位表系統</h1>
            <div class="h-8 w-px bg-gray-300 mx-2"></div>
            
            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-600">班別:</label>
                <select id="classSelect" class="border rounded px-2 py-1 bg-gray-50 focus:ring-2 focus:ring-blue-500 font-bold">
                    <option value="1A">1A</option>
                    <option value="1B">1B</option>
                    <option value="1C">1C</option>
                </select>
            </div>

            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-600">列 (Row):</label>
                <input type="number" id="rowsInput" value="6" min="1" max="10" class="border rounded px-2 py-1 w-16 bg-gray-50 text-center">
            </div>
            
            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-600">行 (Col):</label>
                <input type="number" id="colsInput" value="6" min="1" max="10" class="border rounded px-2 py-1 w-16 bg-gray-50 text-center">
            </div>

            <div class="flex items-center gap-2">
                <label class="text-sm font-semibold text-gray-600">模式:</label>
                <select id="layoutSelect" class="border rounded px-2 py-1 bg-gray-50 focus:ring-2 focus:ring-blue-500">
                    <option value="single">單座位 (考試模式)</option>
                    <option value="double">雙連座</option>
                    <option value="group4">4人一組</option>
                </select>
            </div>
        </div>

        <div class="flex gap-2">
            <button onclick="autoAssign('number')" class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-2 rounded font-medium text-sm transition-colors">
                <i class="fa-solid fa-arrow-down-1-9 mr-1"></i>按學號
            </button>
            <button onclick="autoAssign('height')" class="bg-green-100 text-green-700 hover:bg-green-200 px-3 py-2 rounded font-medium text-sm transition-colors" title="較矮坐前方，較高遠離黑板">
                <i class="fa-solid fa-ruler-vertical mr-1"></i>按高度
            </button>
            <button onclick="autoAssign('random')" class="bg-purple-100 text-purple-700 hover:bg-purple-200 px-3 py-2 rounded font-medium text-sm transition-colors">
                <i class="fa-solid fa-dice mr-1"></i>隨機
            </button>
            <button onclick="clearSeats()" class="bg-red-100 text-red-700 hover:bg-red-200 px-3 py-2 rounded font-medium text-sm transition-colors">
                <i class="fa-solid fa-eraser mr-1"></i>清空
            </button>
            <div class="h-8 w-px bg-gray-300 mx-1"></div>
            <button onclick="exportPDF()" class="bg-gray-800 text-white hover:bg-gray-900 px-4 py-2 rounded font-medium text-sm transition-colors shadow-sm">
                <i class="fa-solid fa-file-pdf mr-1"></i>匯出 PDF
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <div class="flex flex-1 overflow-hidden">
        <!-- 左側：學生名單區 -->
        <div class="w-72 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-3 bg-gray-50 border-b border-gray-200 flex justify-between items-center shadow-sm z-10">
                <span class="font-bold text-gray-700" id="unassignedCount">未分配學生 (0)</span>
                <span class="text-xs text-blue-500 font-medium"><i class="fa-solid fa-image mr-1"></i>點擊相片可更改</span>
            </div>
            <!-- 學生名單容器 (可放置區) -->
            <div id="studentList" class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50" ondragover="allowDrop(event)" ondrop="dropToSidebar(event)">
                <!-- 學生卡片會由 JS 動態生成在這裡 -->
            </div>
        </div>

        <!-- 右側：座位表區 -->

            <div id="printArea" class="max-w-5xl mx-auto bg-white p-8 rounded-xl shadow border border-gray-200 min-h-full flex flex-col">

                <!-- 座位網格 -->

                    <!-- 座位會由 JS 動態生成在這裡 -->

                    </div>
                </div>

            </div>
        </div>

            // 重置狀態：將該班別所有人放入左側，清空座位
            unassignedStudents = allStudents.map(s => s.id);
            seats = {};
            
            // 自動調整適合的行列數以容納該班人數 (預設 6x6)
            const total = allStudents.length;
            if(total > 0 && total > rowsInput.value * colsInput.value) {
                colsInput.value = Math.ceil(Math.sqrt(total));
                rowsInput.value = Math.ceil(total / colsInput.value);
            }
        }

        // 監聽器設置
        function setupEventListeners() {
            classSelect.addEventListener('change', () => { loadClassData(); renderAll(); });
            rowsInput.addEventListener('change', renderAll);
            colsInput.addEventListener('change', renderAll);
            layoutSelect.addEventListener('change', renderAll);
        }

        // --- 渲染邏輯 ---

        function renderAll() {
            renderSidebar();
            renderGrid();
        }

        function getStudentById(id) {
            return allStudents.find(s => s.id === id);
        }

        function renderSidebar() {
            studentListEl.innerHTML = '';
            
            // 排序：確保側邊欄始終按學號排序
            const sortedUnassigned = [...unassignedStudents].sort((a, b) => {
                return getStudentById(a).num - getStudentById(b).num;
            });

            sortedUnassigned.forEach(id => {
                const student = getStudentById(id);
                // 防錯：如果找不到對應學生(例如切換班級殘留)，則略過
                if(student) {
                    studentListEl.appendChild(createStudentCard(student, false));
                }
            });

            unassignedCountEl.innerText = `未分配學生 (${unassignedStudents.length})`;
        }

        function renderGrid() {
            const rows = parseInt(rowsInput.value) || 6;
            const cols = parseInt(colsInput.value) || 6;
            const layout = layoutSelect.value;
            
            seatingGridEl.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center mb-4';
                
                // 處理 4人一組的行間距 (每兩列加一個較大的 bottom margin)
                if (layout === 'group4' && r % 2 === 1 && r !== rows - 1) {
                    rowDiv.classList.add('mb-10');
                }

                for (let c = 0; c < cols; c++) {
                    const seatId = `${r}-${c}`;
                    const seatDiv = document.createElement('div');
                    
                    // 座位基礎樣式
                    seatDiv.className = 'seat w-24 h-32 bg-gray-50 border-2 border-gray-300 rounded-lg shadow-sm flex flex-col items-center justify-center p-1 mx-2 relative overflow-hidden';
                    
                    // 處理列間距 (走廊)
                    if (layout === 'double' && c % 2 === 1 && c !== cols - 1) {
                        seatDiv.classList.add('mr-10'); // 雙連座走廊
                    } else if (layout === 'group4' && c % 2 === 1 && c !== cols - 1) {
                        seatDiv.classList.add('mr-10'); // 4人一組的垂直走廊
                    }

                    // 設置拖放屬性
                    seatDiv.setAttribute('data-seat-id', seatId);
                    seatDiv.ondragover = allowDrop;
                    seatDiv.ondrop = (e) => dropToSeat(e, seatId);
                    seatDiv.ondragenter = (e) => e.currentTarget.classList.add('drag-over');
                    seatDiv.ondragleave = (e) => e.currentTarget.classList.remove('drag-over');

                    // 檢查座位上是否有學生
                    const studentId = seats[seatId];
                    if (studentId) {
                        const student = getStudentById(studentId);
                        if (student) {
                            const card = createStudentCard(student, true);
                            seatDiv.appendChild(card);
                            seatDiv.classList.replace('bg-gray-50', 'bg-white');
                            seatDiv.classList.replace('border-gray-300', 'border-blue-400'); // 有人佔用的邊框顏色
                        }
                    } else {
                        // 空座位提示
                        seatDiv.innerHTML = `<span class="text-gray-300 text-xs select-none">座位</span>`;
                    }

                    rowDiv.appendChild(seatDiv);
                }
                seatingGridEl.appendChild(rowDiv);
            }
        }

        // 創建學生卡片 DOM
        function createStudentCard(student, inSeat) {
            const card = document.createElement('div');
            card.className = `student-card bg-white border border-gray-200 rounded p-2 flex ${inSeat ? 'flex-col h-full w-full justify-center items-center text-center shadow-none border-none' : 'items-center shadow-sm'} group`;
            card.draggable = true;
            card.id = `card-${student.id}`;
            card.setAttribute('data-student-id', student.id);
            
            // 拖曳事件
            card.ondragstart = (e) => {
                draggedStudentId = student.id;
                e.dataTransfer.setData('text/plain', student.id);
                setTimeout(() => card.classList.add('dragging'), 0);
            };
            card.ondragend = () => {
                card.classList.remove('dragging');
                document.querySelectorAll('.seat').forEach(s => s.classList.remove('drag-over'));
            };

            // 相片處理與上傳
            const photoContainer = document.createElement('div');
            photoContainer.className = `relative cursor-pointer ${inSeat ? 'mb-1' : 'mr-3'}`;
            photoContainer.title = "點擊上傳/更換實體照片";
            
            const img = document.createElement('img');
            img.src = student.photo;
            img.className = `${inSeat ? 'w-14 h-14' : 'w-10 h-10'} rounded-full object-cover border-2 border-gray-100 group-hover:brightness-75 transition-all shadow-sm bg-gray-50`;
            
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.className = 'photo-upload';
            fileInput.onchange = (e) => handlePhotoUpload(e, student.id, img);

            photoContainer.onclick = (e) => {
                // 防止點擊相片觸發拖曳或其他事件
                e.stopPropagation(); 
                fileInput.click();
            };

            photoContainer.appendChild(img);
            photoContainer.appendChild(fileInput);

            // 資料區
            const infoDiv = document.createElement('div');
            infoDiv.className = inSeat ? 'w-full' : 'flex-1';
            
            const numName = `<div class="font-bold text-gray-800 text-sm truncate leading-tight">${student.num}. ${student.name}</div>`;
            const extraInfo = inSeat ? 
                `<div class="text-[10px] text-gray-500 mt-0.5 truncate">${student.engName.split(' ')[0]}</div>` : 
                `<div class="text-xs text-gray-500 flex justify-between mt-1"><span>${student.engName}</span><span title="高度" class="text-gray-400 ml-1"><i class="fa-solid fa-ruler-vertical mr-1"></i>${student.height}cm</span></div>`;

            infoDiv.innerHTML = numName + extraInfo;

            card.appendChild(photoContainer);
            card.appendChild(infoDiv);

            return card;
        }

        // 處理照片上傳 (轉為 Base64 儲存)
        function handlePhotoUpload(event, studentId, imgElement) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Src = e.target.result;
                    // 更新陣列資料
                    const student = getStudentById(studentId);
                    if(student) student.photo = base64Src;
                    // 立即更新圖片顯示
                    imgElement.src = base64Src;
                }
                reader.readAsDataURL(file);
            }
        }

        // --- 拖放處理邏輯 ---

        function allowDrop(e) {
            e.preventDefault(); // 必須呼叫才能允許放下
        }

        function dropToSidebar(e) {
            e.preventDefault();
            const studentId = draggedStudentId;
            if (!studentId) return;

            // 檢查是否從座位拖回來的
            const currentSeat = Object.keys(seats).find(key => seats[key] === studentId);
            if (currentSeat) {
                delete seats[currentSeat];
                // 確保不會重複加入
                if (!unassignedStudents.includes(studentId)) {
                    unassignedStudents.push(studentId);
                }
                renderAll();
            }
        }

        function dropToSeat(e, targetSeatId) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const movingStudentId = draggedStudentId;
            if (!movingStudentId) return;

            // 查找該學生目前在哪 (可能是左側，也可能是其他座位)
            const currentSeatId = Object.keys(seats).find(key => seats[key] === movingStudentId);
            const isFromSidebar = unassignedStudents.includes(movingStudentId);
            
            // 查找目標座位上是否有人
            const existingStudentId = seats[targetSeatId];

            if (existingStudentId && existingStudentId !== movingStudentId) {
                // 情況一：目標座位有人 -> 執行【對調】或【頂替】
                if (isFromSidebar) {
                    // 從側邊欄拖入，替換目標學生，原學生回側邊欄
                    unassignedStudents = unassignedStudents.filter(id => id !== movingStudentId);
                    seats[targetSeatId] = movingStudentId;
                    if (!unassignedStudents.includes(existingStudentId)) {
                        unassignedStudents.push(existingStudentId);
                    }
                } else if (currentSeatId) {
                    // 在兩個座位間互換
                    seats[targetSeatId] = movingStudentId;
                    seats[currentSeatId] = existingStudentId;
                }
            } else {
                // 情況二：目標座位是空的
                if (isFromSidebar) {
                    unassignedStudents = unassignedStudents.filter(id => id !== movingStudentId);
                    seats[targetSeatId] = movingStudentId;
                } else if (currentSeatId && currentSeatId !== targetSeatId) {
                    delete seats[currentSeatId];
                    seats[targetSeatId] = movingStudentId;
                }
            }

            renderAll();
        }

        // --- 自動排陣功能 ---

        function getEmptySeatsArray() {
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);
            let emptySeats = [];
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const seatId = `${r}-${c}`;
                    if (!seats[seatId]) emptySeats.push(seatId);
                }
            }
            return emptySeats;
        }

        // 收集所有在側邊欄的學生進行分配
        function autoAssign(method) {
            if (unassignedStudents.length === 0) {
                alert("左側沒有未分配的學生了！");
                return;
            }

            const emptySeats = getEmptySeatsArray();
            if (emptySeats.length < unassignedStudents.length) {
                alert("座位數量不足以容納所有剩餘學生，請增加行列數。");
                return;
            }

            // 根據不同方法排序學生名單
            let studentsToAssign = [...unassignedStudents];
            
            if (method === 'random') {
                studentsToAssign.sort(() => Math.random() - 0.5);
            } else if (method === 'number') {
                studentsToAssign.sort((a, b) => getStudentById(a).num - getStudentById(b).num);
            } else if (method === 'height') {
                // 按高度排序。因為座位是由前到後 (row 0 到 row N，靠近黑板是在下方)，
                // 邏輯上：Row 0 (最上面 = 遠離黑板) 放較高的學生，Row N (最下方 = 靠近黑板) 放較矮的學生。
                // 所以這裡從高到矮排序，先填入遠處。
                studentsToAssign.sort((a, b) => {
                    const hA = parseFloat(getStudentById(a).height) || 0;
                    const hB = parseFloat(getStudentById(b).height) || 0;
                    return hB - hA; // 由大到小 (高到矮)
                });
            }

            // 依序填入空座位
            studentsToAssign.forEach((studentId, index) => {
                const seatId = emptySeats[index];
                seats[seatId] = studentId;
            });

            // 清空側邊欄
            unassignedStudents = [];
            renderAll();
        }

        // --- 修正後的清空功能 ---
        function clearSeats() {
            // 移除 confirm 提示框，實現真正的「一鍵清空」。
            // 這也解決了因為部分瀏覽器沙盒限制導致彈出視窗被阻擋而無法執行的問題。
            unassignedStudents = [...allStudents.map(s => s.id)];
            // 徹底清空所有座位上的學生紀錄
            seats = {};
            // 防錯機制：重置拖曳狀態
            draggedStudentId = null;
            // 重新渲染畫面
            renderAll();
        }

        // --- 匯出 PDF 功能 ---
        function exportPDF() {
            const element = document.getElementById('printArea');
            const className = classSelect.value;
            
            // 設定 PDF 參數
            const opt = {
                margin:       [5, 10, 5, 10], // 上, 右, 下, 左
                filename:     `${className}班_座位表.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' } 
            };

            // 儲存為 PDF (因版面已包含白底與標題，可直接匯出)
            html2pdf().set(opt).from(element).save();
        }

        // 啟動應用
        window.onload = init;

    </script>
</body>
